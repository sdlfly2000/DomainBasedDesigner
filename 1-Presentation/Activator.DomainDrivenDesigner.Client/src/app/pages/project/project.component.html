<div class="project-list-container">
    <H1>{{ title }}</H1>
    <p-divider />
    @if (Projects()){
    <div class="card">
        <p-toolbar>
            <ng-template #start>
                <project-cmd-new></project-cmd-new>
                <project-cmd-open [selectedProjects]="SelectedProjects"></project-cmd-open>
            </ng-template>
        </p-toolbar>
        <p-table #ProjectTable
                 [value]="Projects()"
                 dataKey="id"
                 [rows]="10"
                 [(selection)]="SelectedProjects"
                 sortField="createdOnUTC" 
                 [sortOrder]="-1"
                 [rowsPerPageOptions]="[10, 25, 50]"
                 [loading]="IsLoading"
                 [paginator]="true"
                 [globalFilterFields]="['name', 'description']"
                 [tableStyle]="{ 'min-width': '50rem' }">
            <ng-template #caption>
                <div class="flex">
                    <p-iconfield iconPosition="left" class="ml-auto">
                        <p-inputicon>
                            <i class="pi pi-search"></i>
                        </p-inputicon>
                        <input pInputText type="text" (input)="ProjectTable.filterGlobal($event.target.value, 'contains')" placeholder="Search keyword" />
                    </p-iconfield>
                </div>
            </ng-template>

            <ng-template #header>
                <tr>
                    <th style="width:1%"><p-tableHeaderCheckbox /></th>
                    <th pSortableColumn="name" style="width:22%">Name <p-sortIcon field="name"></p-sortIcon></th>
                    <th pSortableColumn="description" style="width:22%">Description <p-sortIcon field="description"></p-sortIcon></th>
                    <th pSortableColumn="createdOnUTC" style="width:22%">Created On (UTC) <p-sortIcon field="createdOnUTC"></p-sortIcon></th>
                </tr>
            </ng-template>
            <ng-template #body let-project>
                <tr>
                    <td>
                        <p-tableCheckbox [value]="project" />
                    </td>
                    <td>
                        {{ project.name }}
                    </td>
                    <td>
                        {{ project.description }}
                    </td>
                    <td>
                        {{ project.createdOnUTC | date:'medium' }}
                    </td>
                </tr>
            </ng-template>
        </p-table>
    </div>
    }
</div>
